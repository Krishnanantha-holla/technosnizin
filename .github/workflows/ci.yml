name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soniq-backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: soniq
          POSTGRES_PASSWORD: soniq
          POSTGRES_DB: soniq_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        env:
          APP_ENV: development
          SECRET_KEY: ci-test-secret-key-minimum-32-chars-long
          DATABASE_URL: postgresql+asyncpg://soniq:soniq@localhost:5432/soniq_test
          REDIS_URL: redis://localhost:6379/0
          SPOTIFY_CLIENT_ID: ""
          SPOTIFY_CLIENT_SECRET: ""
          SPOTIFY_REDIRECT_URI: ""
        run: pytest --cov=app --cov-report=xml -q

  # ── React frontend ────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soniq-frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: soniq-frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  # ── SvelteKit frontend ────────────────────────────────────────────────────────
  svelte:
    name: Frontend (SvelteKit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soniq-svelte

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: soniq-svelte/package-lock.json

      - run: npm ci
      - run: npm run check
      - run: npm run build

  # ── Rust / WASM ───────────────────────────────────────────────────────────────
  wasm:
    name: Rust WASM Engine
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            soniq-svelte/src/lib/wasm-engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo fmt check
        run: cargo fmt --check
        working-directory: soniq-svelte/src/lib/wasm-engine

      - name: Cargo clippy
        run: cargo clippy -- -D warnings
        working-directory: soniq-svelte/src/lib/wasm-engine

      - name: Cargo test
        run: cargo test
        working-directory: soniq-svelte/src/lib/wasm-engine

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build --target web --release
        working-directory: soniq-svelte/src/lib/wasm-engine
