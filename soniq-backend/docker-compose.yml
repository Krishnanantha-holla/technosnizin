version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    command: celery -A celery_worker worker --loglevel=info --concurrency=1

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: soniq
      POSTGRES_PASSWORD: soniq
      POSTGRES_DB: soniq
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
