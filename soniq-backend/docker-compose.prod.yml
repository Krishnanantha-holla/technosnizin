
# Production compose — use from the repo root:
#   docker compose -f docker-compose.yml -f soniq-backend/docker-compose.prod.yml up -d
#
# Differences from dev:
#   - No port bindings for Postgres/Redis (internal network only)
#   - No --reload on uvicorn
#   - Nginx on port 443 (add your TLS certs)

services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    command: celery -A celery_worker worker --loglevel=warning --concurrency=1

  postgres:
    ports: []   # not exposed to host in prod

  redis:
    ports: []   # not exposed to host in prod
