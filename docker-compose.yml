version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# SONIQ — Full-stack docker-compose (development)
#
# Services:
#   frontend  — SvelteKit static app (nginx, port 5173)
#   api       — FastAPI backend (port 8000)
#   worker    — Celery ML worker
#   nginx     — Reverse proxy (port 80) — routes / → frontend, /api → backend
#   postgres  — PostgreSQL 15
#   redis     — Redis 7
#
# Usage:
#   cp soniq-backend/.env.example soniq-backend/.env   # fill in secrets
#   docker compose up --build
#
# The app will be available at http://localhost
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Frontend (SvelteKit static build served by nginx) ──────────────────────
  frontend:
    build:
      context: ./soniq-svelte
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Backend API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./soniq-backend
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file: ./soniq-backend/.env
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://soniq:${POSTGRES_PASSWORD:-soniq}@postgres:5432/soniq
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Celery ML Worker ───────────────────────────────────────────────────────
  worker:
    build:
      context: ./soniq-backend
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file: ./soniq-backend/.env
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://soniq:${POSTGRES_PASSWORD:-soniq}@postgres:5432/soniq
      - REDIS_URL=redis://redis:6379/0

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: soniq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soniq}
      POSTGRES_DB: soniq
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bind to loopback only — not exposed to host network in prod
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soniq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  uploads:
