events {
    worker_connections 1024;
}

http {
    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream soniq_api {
        server api:8000;
        keepalive 32;
    }

    upstream soniq_frontend {
        server frontend:80;
        keepalive 16;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Tuning ────────────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    keepalive_timeout   65;
    client_max_body_size 55M;   # slightly above MAX_FILE_SIZE_MB=50

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/wasm text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        # Health probe for docker healthcheck
        location = /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Backend API ───────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://soniq_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;   # long for ML analysis jobs
            proxy_send_timeout 300s;
        }

        # ── WebSocket (analysis progress) ─────────────────────────────────────
        location /ws/ {
            proxy_pass         http://soniq_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;   # keep WS alive for long jobs
        }

        # ── SvelteKit frontend (everything else) ──────────────────────────────
        location / {
            proxy_pass         http://soniq_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
